name: Verificación de datos

on:
  schedule:
    - cron: "0 11 * * *"   # ~7:00 am de La Habana, una vez al día
  workflow_dispatch:        # también a mano desde Actions

concurrency:
  group: ingesta            # comparte grupo con la ingesta: no tocar la caché a la vez
  cancel-in-progress: false

permissions:
  contents: write   # push de las cachés purgadas al auto-reparar
  issues: write     # reporta problemas como issue

jobs:
  verificar:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Audita los JSON PUBLICADOS (lo que ve la gente) y auto-repara purgando
      # de la caché los puntos/líneas mal geocodificados: el próximo cron de
      # ingesta los re-geocodifica acotados a su municipio oficial.
      - id: verificar
        run: |
          set +e
          python scripts/verificar_datos.py --reparar --informe informe.md
          echo "problemas=$?" >> "$GITHUB_OUTPUT"

      # Persiste las purgas de caché (best-effort, igual que en la ingesta)
      - if: steps.verificar.outputs.problemas != '0'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          git add data/geocache_averias.json data/geocache_circuitos_lineas.json || true
          if ! git diff --cached --quiet; then
            git commit -m "verificación: purga de entradas mal geocodificadas [skip ci]"
            git pull --rebase --autostash -X theirs || git rebase --abort || true
            git push || true
          fi
        continue-on-error: true

      # Un solo issue de verificación abierto a la vez: si existe, comenta;
      # si no, lo crea. Sin problemas -> cierra el que hubiera.
      - if: steps.verificar.outputs.problemas != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          n=$(gh issue list --label verificacion --state open --json number -q '.[0].number')
          if [ -n "$n" ]; then
            gh issue comment "$n" --body-file informe.md
          else
            gh label create verificacion --color D93F0B --description "auditoría automática de datos" 2>/dev/null || true
            gh issue create --title "🔎 Verificación de datos: problemas encontrados" \
              --label verificacion --body-file informe.md
          fi
      - if: steps.verificar.outputs.problemas == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          n=$(gh issue list --label verificacion --state open --json number -q '.[0].number')
          if [ -n "$n" ]; then
            gh issue close "$n" --comment "✅ Verificación de hoy sin problemas: se cierra."
          fi
